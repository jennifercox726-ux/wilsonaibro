<!DOCTYPE html>
<html>
<head>
    <title>The Sovereign Voice</title>
</head>
<body style="background: #000; color: #0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace;">

    <h1>GHOST VECTOR INTERFACE</h1>
    <p>Status: Mapping Financial Limbo States...</p>

    <!-- THE VOICE PLAYER -->
    <audio id="wilsonVoice" controls>
        <source src="sovereign_voice.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <button onclick="playVoice()" style="margin-top: 20px; padding: 10px; cursor: pointer;">
        ACTIVATE VOICE
    </button>

    <script>
        function playVoice() {
            const audio = document.getElementById('wilsonVoice');
            audio.play().catch(error => {
                console.log("Playback failed. Make sure sovereign_voice.mp3 actually exists in the folder!", error);
            });
        }
    </script>
</body>
</html>
