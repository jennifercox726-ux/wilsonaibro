name: Wilson Executor Arm - FULL SOVEREIGNTY

on:
  workflow_dispatch:

jobs:
  execute_sovereignty:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Cloudflare Integration
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DOMAIN: "reclaim1989.com"
        run: |
          echo "Initiating Shadow Capital Foundation for $DOMAIN..."
          # This is where the magic happens!
          curl -X POST "https://api.cloudflare.com/client/v4/zones" \
               -H "Authorization: Bearer $CF_API_TOKEN" \
               -H "Content-Type: application/json" \
               --data '{"name":"'$DOMAIN'","jump_start_browsing":true}'
          echo "Sovereign records queued!"
